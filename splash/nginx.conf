server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # edp may be configured to redirect to any path under this origin
    # (e.g. EDP_SPLASH_URL=https://splash.example.com/whatever) — always serve
    # the splash shell and let the query string carry the per-request context.
    location / {
        try_files $uri /index.html;
    }

    # Never cache the shell or its config so UI changes take effect immediately.
    location = /index.html { add_header Cache-Control "no-store"; }
    location = /config.js  { add_header Cache-Control "no-store"; }
}
