server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # SPA history fallback: every client route serves the app shell.
    location / {
        try_files $uri /index.html;
    }

    # Never cache the shell or its runtime config, so UI changes and a re-pointed
    # apiBase take effect on the next load.
    location = /index.html { add_header Cache-Control "no-store"; }
    location = /config.js  { add_header Cache-Control "no-store"; }

    # Vite fingerprints hashed assets, so they're safe to cache hard.
    location /assets/ { add_header Cache-Control "public, max-age=31536000, immutable"; }
}
