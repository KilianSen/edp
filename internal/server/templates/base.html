{{define "base.html"}}<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{block "title" .}}edp{{end}} · edp</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="min-h-full">
  <header class="sticky top-0 z-20 border-b border-line bg-ink/85 backdrop-blur">
    <div class="mx-auto flex max-w-5xl items-center justify-between px-5 py-3">
      <a href="/" class="group flex items-center gap-2.5">
        <span class="grid h-6 w-6 place-items-center rounded-md bg-go/15 ring-1 ring-go/40">
          <span class="h-2 w-2 rounded-[2px] bg-go shadow-[0_0_8px_var(--color-go)]"></span>
        </span>
        <span class="font-display text-lg font-semibold tracking-tight">edp</span>
        <span class="hidden font-mono text-[11px] text-faint sm:inline">easy deploy platform</span>
      </a>
      <nav class="flex items-center gap-1 text-sm">
        <a href="/" class="rounded-md px-3 py-1.5 text-dim transition-colors hover:bg-raised hover:text-fg">Environments</a>
        <a href="/env/new" class="btn btn-sm ml-1">New environment</a>
        <form method="post" action="/logout" class="ml-1 inline"><button class="btn-ghost rounded-md px-3 py-1.5 text-sm">Sign out</button></form>
      </nav>
    </div>
  </header>
  <main class="mx-auto max-w-5xl px-5 py-8">
    {{block "content" .}}{{end}}
  </main>
  <script src="/static/htmx.min.js"></script>
  <script src="/static/sse.js"></script>
  <script src="/static/edp.js"></script>
</body>
</html>{{end}}
