# Deploy EDP via Portainer; edp BUILDS the single self-updating Artemis runtime
# from an inline Dockerfile (no repo, no hosted Artemis image) and runs + fronts it.
#
#   NPM (host network)  ──►  127.0.0.1:8800 (edp)  ──►  Artemis runtime container
#   (TLS + hostname)          (router + dashboard)       (8080, on edp's private net)
#
# The whole Artemis environment — including the self-contained Dockerfile (entrypoint
# + MySQL config embedded as base64) — travels in the `artemis-bundle` config below.
# edp imports it on first boot, builds the image, runs ONE container; that container
# clones + builds Artemis at runtime and self-updates the branch.
#
# EDIT: EDP_ADMIN_PASSWORD and the edp image tag. Everything else is set for
# feature/math/scaffold on artemis-1.cloud.kiliansen.de.
configs:
  artemis-bundle:
    content: |
      {
        "version": 1,
        "environments": [
          {
            "name": "artemis-scaffold",
            "source_type": "dockerfile",
            "deploy_type": "container",
            "repo_url": "",
            "git_ref": "",
            "dockerfile_path": "",
            "build_context": "",
            "image_name": "edp/artemis-aio:latest",
            "restart_policy": "unless-stopped",
            "auto_deploy": true,
            "run_env": "ARTEMIS_REPO_URL=https://github.com/KilianSen/Artemis.git\nARTEMIS_BRANCH=feature/math/scaffold\nARTEMIS_PROFILES=artemis,scheduling,core,dev\nPULL_INTERVAL_SECONDS=3600",
            "run_volumes": "artemis-src:/opt/artemis-src\nartemis-mysql:/var/lib/mysql",
            "proxy_host": "artemis-1.cloud.kiliansen.de",
            "proxy_port": "8080",
            "listen_port": "5005",
            "clear_site_data": "cookies,storage",
            "health_type": "none",
            "dockerfile_content": "FROM eclipse-temurin:25-jdk\nENV DEBIAN_FRONTEND=noninteractive LANG=en_US.UTF-8 LANGUAGE=en_US:en LC_ALL=en_US.UTF-8\nENV ARTEMIS_REPO_URL=https://github.com/KilianSen/Artemis.git ARTEMIS_BRANCH=feature/math/scaffold ARTEMIS_PROFILES=artemis,scheduling,core,dev\nRUN set -eux; apt-get update; apt-get install -y --no-install-recommends git curl ca-certificates gnupg graphviz mysql-server mysql-client locales; sed -i 's/^# *en_US.UTF-8/en_US.UTF-8/' /etc/locale.gen; locale-gen\nRUN echo '' | base64 -d > /etc/mysql/mysql.conf.d/zz-artemis.cnf\nRUN echo '' | base64 -d > /entrypoint.sh; chmod +x /entrypoint.sh\nRUN rm -rf /var/lib/mysql; install -d -o mysql -g mysql /var/lib/mysql\nEXPOSE 5005 8080\nENTRYPOINT [\"/entrypoint.sh\"]\n"
          }
        ]
      }
services:
  edp:
    image: ghcr.io/kiliansen/edp:latest          # <-- your edp GHCR image (set exact tag)
    container_name: edp
    restart: unless-stopped
    ports:
      - "127.0.0.1:8800:8080"                     # NPM (host net) forwards here; not public
    environment:
      EDP_ADMIN_PASSWORD: changeme                # <-- set, then remove after first login
      EDP_TRUST_PROXY: "1"                          # behind NPM: honor X-Forwarded-Host/Proto
      EDP_IMPORT: /run/edp/artemis-bundle.json     # edp loads + auto-deploys this on boot
    configs:
      - source: artemis-bundle
        target: /run/edp/artemis-bundle.json
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # edp controls Docker to build + run Artemis
      - edp-data:/data
      - edp-workspace:/workspace

volumes:
  edp-data:
  edp-workspace:
